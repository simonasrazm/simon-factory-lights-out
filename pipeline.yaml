# SFLO Default Pipeline
# Override by placing pipeline.yaml in your project root (cwd).
# The scaffold loads cwd/pipeline.yaml first, falls back to this file.

threshold: B+

gates:
  1:
    artifact: SCOPE.md
    role: pm
    gate_doc: gates/discovery.md
  2:
    artifact: BUILD-STATUS.md
    role: dev
    gate_doc: gates/build.md
  # Insert custom float-keyed gates (e.g. 2.5 for static analysis, 3.5 for
  # security audit) by extending this map in your project's pipeline.yaml.
  # The runner's `run_stst_gate` action handles non-LLM CLI gates when role
  # == "stst" — see src/runner.py for the integration shape; the gate_doc
  # and CLI tool are host-provided.
  3:
    artifact: QA-REPORT.md
    role: qa
    gate_doc: gates/test.md
  4:
    artifact: PM-VERIFY.md
    role: pm
    gate_doc: gates/verify.md
  5:
    artifact: SHIP-DECISION.md
    role: sflo
    gate_doc: gates/ship.md
