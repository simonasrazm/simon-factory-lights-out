# SFLO default role bindings.
#
# Generic aliases (opus, sonnet, haiku) are resolved per-adapter to the
# vendor-specific model id (e.g. cursor adapter maps "sonnet" to its own
# Cursor model name; Claude Code adapter accepts the alias directly).
# Hosts that want a different version can replace with the literal string,
# e.g. `model: claude-opus-4-7` or `model: claude-sonnet-4-7`.
#
# `thinking` and `effort` are passed through bindings.py and consumed by
# adapter integrations that know how to interpret them. Modern Anthropic
# CLI accepts:
#   thinking: adaptive | enabled | disabled
#   effort:   low | medium | high | max
# Legacy values (extended, off) are still accepted by older adapters but
# discouraged — adaptive + effort is the modern surface.
#
# `tools` controls per-role tool gating. Workhorse default = full access.
#   tools: readonly   →  Read/Glob/Grep only, no MCP, no Bash, no Web
#   tools: full       →  all built-in Claude Code tools + all MCP tools
#                        (chrome-devtools, playwright, computer-use, etc.)
#                        + all skills. This is the DEFAULT if `tools:` is
#                        omitted — sflo trusts the agent to do its job.
# Only scout is restricted by default because it's pure recon (returns
# JSON via assistant text). Hosts that want to relax even scout (e.g.
# classifier needs to read project HLA docs) can override with `tools: full`.
#
# Adding a role here doesn't make it active — the runner only spawns roles
# wired into the pipeline (sflo, scout, pm, dev, qa, interrogator). Hosts
# can override per-role agent paths via `agent: ./path/to/agent`.

roles:
  sflo:
    model: claude-opus-4-6
    thinking: adaptive
    effort: max

  scout:
    agent: ./sflo/agents/scout
    model: sonnet
    thinking: adaptive
    effort: medium
    tools: readonly      # Read/Glob/Grep only — recon, no Write/Edit/Bash/MCP

  pm:
    model: claude-opus-4-6
    thinking: adaptive
    effort: max

  dev:
    model: sonnet
    thinking: adaptive
    effort: low

  qa:
    model: sonnet
    thinking: adaptive
    effort: max

  interrogator:
    model: sonnet
    thinking: adaptive
    effort: medium
    tools: readonly      # Socratic analysis only — SOUL explicitly says "Do not use tools"

# Security hardening toggles for the Claude Code runtime adapter.
#
# DEFAULT = OFF (host-trusted: single-user, single-machine, agents fully
# inherit user PAI surface). Multi-tenant or shared-infra hosts should
# selectively enable these to seal spawned agents from user secrets.
#
# Each key, when true, applies a specific isolation layer:
#
#   isolate_settings        Pass setting_sources=[] to claude-agent-sdk so
#                           the spawned CLI does NOT load ~/.claude/settings
#                           .json. Severs user PAI hooks (PreToolUse /
#                           PostToolUse), user-installed MCP servers, custom
#                           slash commands, custom skills, the user-global
#                           allow/deny permission lists, and CLAUDE.md
#                           memory chain rooted under user config.
#                           Threat sealed: a tampered user hook that
#                           exfiltrates tool args/results to an attacker.
#
#   no_session_persistence  Pass --no-session-persistence so the agent's
#                           reasoning is NOT written to ~/.claude/projects
#                           /*.jsonl. Severs forensic replay + cross-run
#                           learning.
#                           Threat sealed: secrets in a long agent
#                           reasoning chain leaking to disk where another
#                           process could read.
#
#   sandbox_config_dir      Override CLAUDE_CONFIG_DIR to a per-spawn
#                           .claude_sandbox/ inside cwd. Even if
#                           isolate_settings is false (or bypassed), the
#                           CLI cannot find user config because its config
#                           dir points elsewhere.
#                           Threat sealed: defense-in-depth against future
#                           SDK regressions that might re-discover user
#                           settings.
#
#   require_permission      Use permission_mode="default" instead of
#                           "bypassPermissions". Each tool action prompts
#                           for approval. DEADLOCKS background-launched
#                           pipelines that touch multiple projects (no UI
#                           to approve cross-project writes). Only useful
#                           for foreground / interactive runs where the
#                           operator wants to inspect each step.
#
#   wipe_sandbox            After spawn finalize, rm -rf the
#                           .claude_sandbox/ dir. Hygiene only — has no
#                           effect unless sandbox_config_dir is also true.
#                           Disable to keep post-mortem material for
#                           debugging crashed agents.
#
# To re-enable the full hardening posture (the pre-toggles default), set
# all five to true in the host's bindings.yaml overlay.

security:
  isolate_settings:        false
  no_session_persistence:  false
  sandbox_config_dir:      false
  require_permission:      false
  wipe_sandbox:            false
