[pytest]
# Anchor pytest rootdir to sflo/ so the parent sflo-dev/pyproject.toml
# pythonpath (which points at sflo-dev root, not sflo/) does NOT apply.
# Without this, `pytest tests/` from sflo/ fails to import src.archive
# etc. because pytest escalates to parent's config.
pythonpath = .
testpaths = tests
addopts = --strict-markers
